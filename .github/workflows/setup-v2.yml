name: setup-v2 macOS and Windows

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # One in-flight run per ref. A same-repo PR branch now runs the matrix once
  # (pull_request) instead of twice (push + pull_request); pushing a new commit
  # to a PR cancels the prior run. main still gets a post-merge run via push.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    # Named per-area so the Actions UI shows, at a glance, which group of tests
    # is running/failing under which OS (#13) -- e.g. "windows-latest /
    # retrieval" -- instead of one undifferentiated "fast" blob. Areas reuse the
    # taxonomy from .github/CONTRIBUTING.md; "other" is everything not marked
    # retrieval/ollama and not under tests/installer/ (mcp-tools, mcp-mgmt,
    # client-integration, wizard, general utils). test_ci_configuration.py's
    # test_every_test_is_covered_by_exactly_one_ci_bucket regression test
    # guards against a test silently falling into none of these buckets.
    name: ${{ matrix.os }} / ${{ matrix.area }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        area: [installer, retrieval, ollama, other]
        include:
          - area: installer
            pytest_args: '-m "not slow" tests/installer'
          - area: retrieval
            pytest_args: '-m "retrieval and not slow"'
          - area: ollama
            pytest_args: '-m "ollama and not slow"'
          - area: other
            pytest_args: '-m "not retrieval and not ollama and not slow and not serial" --ignore=tests/installer'
    steps:
      - uses: actions/checkout@v4
      - name: Detect non-docs changes
        # See Phase 0: in-job filter keeps required checks reporting on docs-only
        # PRs. Duplicated in the slow job because each job runs on a fresh runner;
        # de-duping two jobs via a composite action is more machinery than warranted.
        uses: dorny/paths-filter@v3
        id: changes
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        if: github.event_name == 'push' || steps.changes.outputs.code == 'true'
        run: python -m pip install -e ".[test]"
      - name: Fast tests
        if: github.event_name == 'push' || steps.changes.outputs.code == 'true'
        # -n auto parallelizes across the runner's CPU cores (~5x faster on
        # Windows). Only the fast suite is parallelized; the native-lifecycle
        # tests in the slow job build real venvs and manipulate real process
        # trees, so they stay serial to avoid cross-worker collisions.
        run: python -m pytest -q ${{ matrix.pytest_args }} -n auto
      - name: Serial tests
        # The real stdio subprocess test runs serially in the "other" bucket
        # only (it lives in test_distribution.py, unmarked retrieval/ollama):
        # it has flaked when a loaded Windows runner starved its server process
        # behind the xdist worker pool.
        if: (github.event_name == 'push' || steps.changes.outputs.code == 'true') && matrix.area == 'other'
        run: python -m pytest -q -m "serial and not slow" --ignore=tests/installer
      - name: Compile
        if: (github.event_name == 'push' || steps.changes.outputs.code == 'true') && matrix.area == 'other'
        run: python -m compileall -q neo_localmcp setup.py

  slow:
    name: ${{ matrix.os }} / lifecycle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lifecycle: tests/installer/test_macos_lifecycle.py
          - os: windows-latest
            lifecycle: tests/installer/test_windows_lifecycle.py
    steps:
      - uses: actions/checkout@v4
      - name: Detect non-docs changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '!**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        if: github.event_name == 'push' || steps.changes.outputs.code == 'true'
        run: python -m pip install -e ".[test]"
      - name: Build offline wheelhouse for lifecycle installs
        # The lifecycle tests run setup.py install/reinstall ~6x, each doing a real
        # `python -m venv` + pip install of the runtime FROM SOURCE. Prebuild every
        # wheel those installs need -- runtime deps (mcp[cli], psutil), the build
        # backend (setuptools, wheel), and pip itself -- ONCE here, with the network.
        # The Native lifecycle step then runs with PIP_NO_INDEX + PIP_FIND_LINKS so
        # each in-test install resolves offline from this dir (wheel-unpacking, no
        # PyPI round-trip). The installer's subprocesses inherit the env vars; no
        # production code changes. Verified locally: 41 wheels, no sdists, offline
        # source-install of neo-localmcp succeeds (deps + build backend + pip-upgrade).
        if: github.event_name == 'push' || steps.changes.outputs.code == 'true'
        shell: bash
        run: python -m pip download -d "${{ runner.temp }}/wheelhouse" pip setuptools wheel "mcp[cli]" psutil
      - name: Native lifecycle
        if: github.event_name == 'push' || steps.changes.outputs.code == 'true'
        env:
          PIP_NO_INDEX: '1'
          PIP_FIND_LINKS: ${{ runner.temp }}/wheelhouse
        run: python -m pytest -q -m slow ${{ matrix.lifecycle }}

  ci-gate:
    # Single required status check. Aggregates the matrix jobs so branch
    # protection never has to change when the job layout changes. `if: always()`
    # makes it run even when a dependency fails (a failed `needs` would otherwise
    # skip it, and a skipped required check does not satisfy protection).
    name: ci-gate
    needs: [fast, slow]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require fast and slow to have succeeded
        run: |
          echo "fast=${{ needs.fast.result }} slow=${{ needs.slow.result }}"
          if [ "${{ needs.fast.result }}" != "success" ] || [ "${{ needs.slow.result }}" != "success" ]; then
            echo "::error::A required CI job did not succeed (fast=${{ needs.fast.result }}, slow=${{ needs.slow.result }})."
            exit 1
          fi
          echo "All required CI jobs succeeded."
