name: setup-v2 macOS and Windows

on:
  push:
  pull_request:

jobs:
  verify:
    name: ${{ matrix.os }} / Python 3.12
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            lifecycle: tests/installer/test_macos_lifecycle.py
          - os: windows-latest
            lifecycle: tests/installer/test_windows_lifecycle.py

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Fast tests
        run: python -m pytest -q -m "not slow"
      - name: Native lifecycle
        run: python -m pytest -q -m slow ${{ matrix.lifecycle }}
      - name: Compile
        run: python -m compileall -q neo_localmcp setup_v2.py
