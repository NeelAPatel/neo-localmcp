name: Bug report
description: Something isn't working as documented/expected
title: "fix(area): "
labels: ["type:fix"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: >
        Pick the closest match, then add the matching area:* label yourself
        after creating this issue (see .github/CONTRIBUTING.md for the full
        taxonomy). Also replace "area" in the title above with this value.
      options:
        - wizard
        - installer
        - client-integration
        - mcp-tools
        - mcp-mgmt
        - mcp-toolkit
        - ollama
        - retrieval
        - benchmark
        - not sure / spans multiple
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Exact commands/steps, if known.
  - type: input
    id: platform
    attributes:
      label: OS / Python version
      placeholder: "e.g. Windows 11, Python 3.12.10"
